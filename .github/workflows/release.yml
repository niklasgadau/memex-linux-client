name: Release .deb

on:
  push:
    branches: [main]

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install svu and nfpm
        run: |
          # svu via GitHub release binary
          curl -sL https://github.com/caarlos0/svu/releases/latest/download/svu_linux_amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin svu

          # nfpm via goreleaser apt repo
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Determine version
        id: version
        run: |
          VERSION=$(svu next)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build package tree
        run: |
          pip install --target=build/usr/lib/python3/dist-packages/ .

          mkdir -p build/usr/bin
          cat > build/usr/bin/memex-client << 'SCRIPT'
          #!/usr/bin/python3
          import sys
          sys.path.insert(0, "/usr/lib/python3/dist-packages")
          from memex_client.cli import main
          main()
          SCRIPT
          chmod +x build/usr/bin/memex-client

      - name: Build .deb
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.version }} nfpm package --packager deb --target dist/

      - name: Create tag and release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" dist/*.deb --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
