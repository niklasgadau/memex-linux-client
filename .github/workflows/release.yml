name: Release .deb

on:
  push:
    branches: [main]

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install svu and nfpm
        run: |
          gh release download --repo caarlos0/svu --pattern '*amd64.deb' --dir /tmp
          gh release download --repo goreleaser/nfpm --pattern '*amd64.deb' --dir /tmp
          sudo dpkg -i /tmp/svu_*_amd64.deb /tmp/nfpm_*_amd64.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          VERSION=$(svu next)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build package tree
        run: |
          pip install --target=build/usr/lib/python3/dist-packages/ .

          mkdir -p build/usr/bin
          cat > build/usr/bin/memex-client << 'SCRIPT'
          #!/usr/bin/python3
          import sys
          sys.path.insert(0, "/usr/lib/python3/dist-packages")
          from memex_client.cli import main
          main()
          SCRIPT
          chmod +x build/usr/bin/memex-client

      - name: Build .deb
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.version }} nfpm package --packager deb --target dist/

      - name: Create tag and release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" dist/*.deb --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build APT repository
        run: |
          sudo apt-get install -y reprepro

          mkdir -p apt-repo/conf
          cat > apt-repo/conf/distributions <<'CONF'
          Origin: memex-linux-client
          Label: memex-linux-client
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Memex Linux Client APT Repository
          SignWith: default
          CONF

          # Add current .deb
          reprepro -b apt-repo includedeb stable dist/*.deb

          # Export public key for clients
          gpg --armor --export > apt-repo/KEY.gpg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apt-repo

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
